<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Knocker Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 min-h-screen">
  <div id="app" class="container mx-auto px-4 py-8">
    
    <!-- Main Menu -->
    <div id="mainMenu" class="flex flex-col items-center justify-center min-h-screen">
      <h1 class="text-5xl md:text-7xl font-bold text-purple-400 mb-4 text-center">
        The Knocker Game
      </h1>
      <p class="text-gray-400 text-lg mb-12 text-center">
        Conócete a ti mismo y a los demás
      </p>
      
      <div class="flex flex-col gap-4 w-full max-w-xs">
        <button onclick="showCreateGame()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-8 rounded-xl transition-all duration-300 transform hover:scale-105">
          Crear Partida
        </button>
        <button onclick="showJoinGame()" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-4 px-8 rounded-xl transition-all duration-300 transform hover:scale-105">
          Unirse a Partida
        </button>
      </div>
    </div>

    <!-- Create Game Screen -->
    <div id="createGame" class="hidden flex flex-col items-center justify-center min-h-screen">
      <button onclick="showMainMenu()" class="absolute top-8 left-8 text-gray-400 hover:text-white text-lg">
        ← Volver
      </button>
      
      <h2 class="text-4xl font-bold text-purple-400 mb-8">Crear Partida</h2>
      
      <div class="w-full max-w-md space-y-6">
        <div>
          <label class="block text-gray-300 mb-2">Tu Nombre</label>
          <input type="text" id="playerName" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500">
        </div>
        
        <div>
          <label class="block text-gray-300 mb-2">Modo de Juego</label>
          <select id="gameMode" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500">
            <option value="classic">Modo Clásico (Espejo de Preguntas)</option>
            <option value="speed">Modo Rápido (Coming Soon)</option>
            <option value="deep">Modo Profundo (Coming Soon)</option>
          </select>
        </div>
        
        <button onclick="createGame()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-8 rounded-xl transition-all duration-300 transform hover:scale-105">
          Crear y Esperar
        </button>
      </div>
    </div>

    <!-- Join Game Screen -->
    <div id="joinGame" class="hidden flex flex-col items-center justify-center min-h-screen">
      <button onclick="showMainMenu()" class="absolute top-8 left-8 text-gray-400 hover:text-white text-lg">
        ← Volver
      </button>
      
      <h2 class="text-4xl font-bold text-purple-400 mb-8">Unirse a Partida</h2>
      
      <div class="w-full max-w-md space-y-6">
        <div>
          <label class="block text-gray-300 mb-2">Tu Nombre</label>
          <input type="text" id="joinPlayerName" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500">
        </div>
        
        <div>
          <label class="block text-gray-300 mb-2">Partidas Disponibles</label>
          <div id="gameList" class="bg-gray-800 rounded-lg p-4 max-h-60 overflow-y-auto">
            <p class="text-gray-500 text-center">No hay partidas disponibles</p>
          </div>
        </div>
        
        <div>
          <label class="block text-gray-300 mb-2">O introduce el código:</label>
          <input type="text" id="gameCode" placeholder="ABCD" maxlength="4" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white text-center text-2xl uppercase focus:outline-none focus:border-purple-500">
        </div>
        
        <button onclick="joinGameByCode()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-8 rounded-xl transition-all duration-300 transform hover:scale-105">
          Unirse
        </button>
      </div>
    </div>

    <!-- Waiting Room -->
    <div id="waitingRoom" class="hidden flex flex-col items-center justify-center min-h-screen">
      <h2 class="text-4xl font-bold text-purple-400 mb-4">Esperando jugador...</h2>
      <p class="text-gray-400 text-lg mb-8">Comparte este código con tu amigo:</p>
      
      <div class="bg-gray-800 rounded-xl p-6 mb-8">
        <span id="roomCode" class="text-5xl font-bold text-yellow-400 tracking-widest"></span>
      </div>
      
      <button onclick="leaveGame()" class="text-gray-400 hover:text-red-400">
        Cancelar partida
      </button>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="hidden flex flex-col items-center justify-center min-h-screen">
      <div class="w-full max-w-2xl">
        <div class="flex justify-between items-center mb-8">
          <div id="player1Info" class="text-left">
            <p class="text-gray-400 text-sm">Jugador 1</p>
            <p id="player1Name" class="text-white text-xl font-bold"></p>
          </div>
          
          <div class="text-center">
            <p class="text-gray-400 text-sm">Nivel</p>
            <p id="currentLevel" class="text-purple-400 text-2xl font-bold">1</p>
          </div>
          
          <div id="player2Info" class="text-right">
            <p class="text-gray-400 text-sm">Jugador 2</p>
            <p id="player2Name" class="text-white text-xl font-bold"></p>
          </div>
        </div>
        
        <div id="questionCard" class="bg-gray-800 rounded-2xl p-8 mb-8 shadow-2xl">
          <p id="question" class="text-2xl md:text-3xl text-white text-center leading-relaxed"></p>
        </div>
        
        <div id="turnIndicator" class="text-center mb-8">
          <p class="text-gray-400 mb-2">Turno de:</p>
          <p id="currentPlayerTurn" class="text-purple-400 text-2xl font-bold"></p>
        </div>
        
        <div class="flex justify-center">
          <button id="nextTurnBtn" onclick="nextTurn()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-12 rounded-xl transition-all duration-300 transform hover:scale-105">
            Listo, te toca
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
